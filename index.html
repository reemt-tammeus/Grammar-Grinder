<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GrammarGrinder</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="flash-overlay"></div>

    <canvas id="fireworks-canvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:999;"></canvas>

    <div id="app-wrapper">

        <section id="start-screen" class="screen active">
            <div class="menu-card">
                <button class="btn-mode" id="btn-quickie">Five Gap Quickie</button>
                <button class="btn-mode" id="btn-ap">AP-Mode</button>
            </div>
        </section>

        <section id="game-screen" class="screen">
            
            <div class="hud-top">
                <div id="ap-hud-elements" style="display: none; flex: 1; display: flex; align-items: center; gap: 20px;">
                    <div id="hearts-container" class="hearts-container">
                        </div>
                    <div id="timer-display" class="timer">05:00</div>
                </div>
                
                <div id="q-hud-elements" style="display: none; flex: 1; align-items: center; gap: 20px;">
                    <div id="stopwatch-display" class="timer">00:00</div>
                    <div id="best-time-display" style="font-size: 0.7rem; opacity: 0.7;">Best: --:--</div>
                </div>

                <button class="btn-menu" id="btn-goto-menu">MENU</button>
            </div>

            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <div id="text-display" class="text-container">
                </div>

            <div id="feedback-message" class="feedback-msg"></div>

            <div class="footer-controls">
                <div id="keyboard-container" class="keyboard" style="display: none;">
                    </div>

                <div id="mc-container" class="mc-container" style="display: none;">
                    </div>
            </div>
        </section>

        <section id="result-screen" class="screen" style="justify-content: center; align-items: center; text-align: center;">
            <div class="menu-card">
                <h1 id="result-title" style="color: var(--success); font-size: 2rem; margin-bottom: 10px;">FERTIG!</h1>
                <p id="result-stats" style="margin-bottom: 20px;">Statistiken laden...</p>
                <button class="btn-mode" onclick="location.reload()">NOCHMAL</button>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
