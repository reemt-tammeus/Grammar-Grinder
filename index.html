<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrammarGrinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="flash-overlay"></div>
    <canvas id="fireworks-canvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:99;"></canvas>

    <div id="app-wrapper">
        <section id="start-screen" class="screen active">
            <div style="background: rgba(255,255,255,0.2); padding: 30px; border-radius: 20px; backdrop-filter: blur(5px);">
                <button class="btn-mode" id="btn-quickie">Five Gap Quickie</button>
                <button class="btn-mode" id="btn-ap">AP-Mode</button>
            </div>
        </section>

        <section id="game-screen" class="screen">
            <div class="hud-top">
                <div id="hearts" class="hearts"></div>
                <div id="timer" class="timer">05:00</div>
                <button id="btn-menu" style="background:none; border:1px solid #666; color:#666; padding:5px 10px; border-radius:5px;">MENU</button>
            </div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div id="text-display" class="text-container"></div>
            <div id="feedback-message" style="text-align:center; margin:10px; font-weight:bold; min-height:1.2em;"></div>
            <div class="footer-controls">
                <div id="keyboard-container" class="keyboard"></div>
                <div id="mc-container" style="display:none; flex-direction:column; gap:10px;"></div>
            </div>
        </section>

        <section id="result-screen" class="screen" style="justify-content:center; align-items:center;">
            <h1 id="res-title">FERTIG!</h1>
            <p id="res-stats"></p>
            <button class="btn-mode" onclick="location.reload()">NOCHMAL</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
